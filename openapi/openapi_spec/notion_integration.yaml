openapi: 3.0.0
info:
  title: MediaJira Notion Integration API
  version: 1.0.0
  description: |
    API contract for connecting a user's external Notion workspace and
    moving content between Notion and MediaJira Notion drafts.

    This file defines the contract only. It does not imply the backend
    implementation is complete.
servers:
  - url: http://localhost:8000
    description: Local development server
tags:
  - name: Notion Integration
    description: OAuth connection and Notion import/export workflows
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    NotionConnectionStatus:
      type: object
      required:
        - connected
      properties:
        connected:
          type: boolean
          description: Whether the authenticated user has an active Notion connection.
        workspace_id:
          type: string
          nullable: true
          description: Connected Notion workspace ID.
        workspace_name:
          type: string
          nullable: true
          description: Connected Notion workspace display name.
        workspace_icon:
          type: string
          nullable: true
          description: Connected Notion workspace icon URL.
        bot_id:
          type: string
          nullable: true
          description: Notion integration bot/user ID when available.
        bot_name:
          type: string
          nullable: true
          description: Notion integration bot/user display name when available.
        connected_at:
          type: string
          format: date-time
          nullable: true
          description: Time when the connection became active.
    NotionConnectResponse:
      type: object
      required:
        - auth_url
        - state
      properties:
        auth_url:
          type: string
          format: uri
          description: Notion OAuth authorization URL.
        state:
          type: string
          description: Opaque OAuth state value generated by the backend.
    NotionDisconnectResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
    NotionImportRequest:
      type: object
      required:
        - page
      properties:
        page:
          type: string
          description: Notion page URL or page ID to import.
        draft_id:
          type: integer
          nullable: true
          description: Optional existing MediaJira draft ID to replace with imported content.
    NotionDraftSummary:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: integer
          description: MediaJira Notion draft ID.
        title:
          type: string
        status:
          type: string
          enum:
            - draft
            - published
            - archived
        content_blocks_count:
          type: integer
        updated_at:
          type: string
          format: date-time
    NotionImportResponse:
      type: object
      required:
        - draft
      properties:
        source_page_id:
          type: string
          nullable: true
          description: External Notion page ID that was imported.
        draft:
          $ref: '#/components/schemas/NotionDraftSummary'
    NotionExportRequest:
      type: object
      required:
        - draft_id
      properties:
        draft_id:
          type: integer
          description: MediaJira Notion draft ID to export.
        parent_page_id:
          type: string
          nullable: true
          description: Optional Notion parent page ID where the exported page should be created.
        title:
          type: string
          nullable: true
          description: Optional title override for the exported Notion page.
    NotionExportResponse:
      type: object
      required:
        - page_id
        - url
      properties:
        page_id:
          type: string
          description: Newly created external Notion page ID.
        url:
          type: string
          format: uri
          description: URL of the exported Notion page.
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        details:
          type: object
          additionalProperties: true
paths:
  /api/notion/status/:
    get:
      summary: Get Notion connection status
      tags:
        - Notion Integration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Connection status returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotionConnectionStatus'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/notion/connect/:
    get:
      summary: Start Notion OAuth connection
      tags:
        - Notion Integration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notion authorization URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotionConnectResponse'
        '400':
          description: Notion OAuth is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/notion/callback/:
    get:
      summary: Handle Notion OAuth callback
      tags:
        - Notion Integration
      parameters:
        - in: query
          name: code
          schema:
            type: string
          required: false
          description: Authorization code returned by Notion.
        - in: query
          name: state
          schema:
            type: string
          required: false
          description: OAuth state value originally generated by the backend.
        - in: query
          name: error
          schema:
            type: string
          required: false
          description: OAuth error returned by Notion when the user cancels or authorization fails.
      responses:
        '302':
          description: Redirects back to the frontend with success or error query parameters.
        '400':
          description: Invalid callback request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/notion/disconnect/:
    post:
      summary: Disconnect Notion workspace
      tags:
        - Notion Integration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notion disconnected successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotionDisconnectResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/notion/import/:
    post:
      summary: Import external Notion page into a MediaJira draft
      tags:
        - Notion Integration
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotionImportRequest'
      responses:
        '200':
          description: Notion page imported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotionImportResponse'
        '400':
          description: Invalid request or Notion is not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Notion denied access to the requested page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Notion page or MediaJira draft not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/notion/export/:
    post:
      summary: Export MediaJira draft to external Notion
      tags:
        - Notion Integration
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotionExportRequest'
      responses:
        '200':
          description: Draft exported to Notion successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotionExportResponse'
        '400':
          description: Invalid request or Notion is not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Notion denied access to the target workspace or parent page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: MediaJira draft or Notion parent page not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
