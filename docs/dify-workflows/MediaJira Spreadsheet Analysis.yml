    - data:
        code: "def main(analysis_json: str) -> dict:\n    import json\n\n    # 清理可能的\
          \ markdown 代码块包裹\n    text = analysis_json.strip()\n    if text.startswith('```json'):\n\
          \        text = text[7:]\n    if text.startswith('```'):\n        text =\
          \ text[3:]\n    if text.endswith('```'):\n        text = text[:-3]\n   \
          \ text = text.strip()\n\n    try:\n        result = json.loads(text)\n \
          \   except json.JSONDecodeError:\n        return {'validated_result': analysis_json,\
          \ 'is_valid': 0}\n\n    # 验证顶层结构\n    if not isinstance(result.get('anomalies'),\
          \ list):\n        return {'validated_result': analysis_json, 'is_valid':\
          \ 0}\n    if not isinstance(result.get('suggested_decision'), dict):\n \
          \       return {'validated_result': analysis_json, 'is_valid': 0}\n    if\
          \ not isinstance(result.get('recommended_tasks'), list):\n        return\
          \ {'validated_result': analysis_json, 'is_valid': 0}\n\n    # 验证并修复枚举值\n\
          \    valid_metrics = {\n        'ROAS', 'CPA', 'CTR', 'CONVERSION_RATE',\
          \ 'REVENUE', 'PURCHASES',\n        'CLICKS', 'IMPRESSIONS', 'CPC', 'CPM',\
          \ 'AD_SPEND', 'AOV'\n    }\n    valid_movements = {\n        'SHARP_INCREASE',\
          \ 'MODERATE_INCREASE', 'SLIGHT_INCREASE',\n        'NO_SIGNIFICANT_CHANGE',\
          \ 'SLIGHT_DECREASE', 'MODERATE_DECREASE',\n        'SHARP_DECREASE', 'VOLATILE',\
          \ 'UNEXPECTED_SPIKE', 'UNEXPECTED_DROP'\n    }\n    valid_scope_types =\
          \ {'CAMPAIGN', 'AD_SET', 'AD', 'CHANNEL', 'AUDIENCE', 'REGION'}\n    valid_delta_units\
          \ = {'PERCENT', 'CURRENCY', 'ABSOLUTE'}\n    valid_periods = {'LAST_24_HOURS',\
          \ 'LAST_3_DAYS', 'LAST_7_DAYS', 'LAST_14_DAYS', 'LAST_30_DAYS'}\n    valid_risk\
          \ = {'LOW', 'MEDIUM', 'HIGH'}\n    valid_task_types = {\n        'budget',\
          \ 'asset', 'report', 'retrospective', 'experiment',\n        'execution',\
          \ 'scaling', 'alert', 'optimization', 'communication',\n        'platform_policy_update'\n\
          \    }\n    valid_priorities = {'HIGH', 'MEDIUM', 'LOW'}\n\n    # 修复 anomalies\
          \ 中的无效枚举值\n    for a in result['anomalies']:\n        if a.get('metric')\
          \ not in valid_metrics:\n            a['metric'] = 'ROAS'\n        if a.get('movement')\
          \ not in valid_movements:\n            a['movement'] = 'MODERATE_DECREASE'\n\
          \        if a.get('scope_type') not in valid_scope_types:\n            a['scope_type']\
          \ = 'CAMPAIGN'\n        if a.get('delta_unit') not in valid_delta_units:\n\
          \            a['delta_unit'] = 'PERCENT'\n        if a.get('period') not\
          \ in valid_periods:\n            a['period'] = 'LAST_7_DAYS'\n        #\
          \ 确保 delta_value 是数字\n        try:\n            a['delta_value'] = float(a.get('delta_value',\
          \ 0))\n        except (TypeError, ValueError):\n            a['delta_value']\
          \ = 0.0\n\n    # 修复 suggested_decision\n    sd = result['suggested_decision']\n\
          \    if sd.get('risk_level') not in valid_risk:\n        sd['risk_level']\
          \ = 'MEDIUM'\n    if not isinstance(sd.get('confidence'), int) or sd['confidence']\
          \ < 1 or sd['confidence'] > 5:\n        try:\n            sd['confidence']\
          \ = max(1, min(5, int(sd.get('confidence', 3))))\n        except (TypeError,\
          \ ValueError):\n            sd['confidence'] = 3\n    # 确保 options 存在且有\
          \ order\n    options = sd.get('options', [])\n    if not options:\n    \
          \    sd['options'] = [{'text': 'Review and take appropriate action', 'order':\
          \ 0}]\n    else:\n        for i, opt in enumerate(options):\n          \
          \  if 'order' not in opt:\n                opt['order'] = i\n\n    # 修复\
          \ recommended_tasks\n    for t in result['recommended_tasks']:\n       \
          \ if t.get('type') not in valid_task_types:\n            t['type'] = 'optimization'\n\
          \        if t.get('priority') not in valid_priorities:\n            t['priority']\
          \ = 'MEDIUM'\n\n    return {\n        'validated_result': json.dumps(result),\n\
          \        'is_valid': 1\n    }\n"
        code_language: python3
