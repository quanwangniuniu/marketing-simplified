    - data:
        code: |
          def main(analysis_json: str) -> dict:
              import json

              text = analysis_json.strip()
              if text.startswith('```json'):
                  text = text[7:]
              if text.startswith('```'):
                  text = text[3:]
              if text.endswith('```'):
                  text = text[:-3]
              text = text.strip()

              try:
                  result = json.loads(text)
              except json.JSONDecodeError:
                  return {'validated_result': analysis_json, 'is_valid': 0}

              if not isinstance(result.get('anomalies'), list):
                  return {'validated_result': analysis_json, 'is_valid': 0}
              if not isinstance(result.get('suggested_decision'), dict):
                  return {'validated_result': analysis_json, 'is_valid': 0}
              if not isinstance(result.get('recommended_tasks'), list):
                  return {'validated_result': analysis_json, 'is_valid': 0}

              valid_metrics = {
                  'ROAS', 'CPA', 'CTR', 'CONVERSION_RATE', 'REVENUE', 'PURCHASES',
                  'CLICKS', 'IMPRESSIONS', 'CPC', 'CPM', 'AD_SPEND', 'AOV'
              }
              valid_movements = {
                  'SHARP_INCREASE', 'MODERATE_INCREASE', 'SLIGHT_INCREASE',
                  'NO_SIGNIFICANT_CHANGE', 'SLIGHT_DECREASE', 'MODERATE_DECREASE',
                  'SHARP_DECREASE', 'VOLATILE', 'UNEXPECTED_SPIKE', 'UNEXPECTED_DROP'
              }
              valid_scope_types = {'CAMPAIGN', 'AD_SET', 'AD', 'CHANNEL', 'AUDIENCE', 'REGION'}
              valid_delta_units = {'PERCENT', 'CURRENCY', 'ABSOLUTE'}
              valid_periods = {'LAST_24_HOURS', 'LAST_3_DAYS', 'LAST_7_DAYS', 'LAST_14_DAYS', 'LAST_30_DAYS'}
              valid_risk = {'LOW', 'MEDIUM', 'HIGH'}
              valid_task_types = {
                  'budget', 'asset', 'report', 'retrospective', 'experiment',
                  'execution', 'scaling', 'alert', 'optimization', 'communication',
                  'platform_policy_update'
              }
              valid_priorities = {'HIGH', 'MEDIUM', 'LOW'}

              for a in result['anomalies']:
                  if a.get('metric') not in valid_metrics:
                      a['metric'] = 'ROAS'
                  if a.get('movement') not in valid_movements:
                      a['movement'] = 'MODERATE_DECREASE'
                  if a.get('scope_type') not in valid_scope_types:
                      a['scope_type'] = 'CAMPAIGN'
                  if a.get('delta_unit') not in valid_delta_units:
                      a['delta_unit'] = 'PERCENT'
                  if a.get('period') not in valid_periods:
                      a['period'] = 'LAST_7_DAYS'
                  try:
                      a['delta_value'] = float(a.get('delta_value', 0))
                  except (TypeError, ValueError):
                      a['delta_value'] = 0.0

              sd = result['suggested_decision']
              if sd.get('risk_level') not in valid_risk:
                  sd['risk_level'] = 'MEDIUM'
              if not isinstance(sd.get('confidence'), int) or sd['confidence'] < 1 or sd['confidence'] > 5:
                  try:
                      sd['confidence'] = max(1, min(5, int(sd.get('confidence', 3))))
                  except (TypeError, ValueError):
                      sd['confidence'] = 3
              options = sd.get('options', [])
              if not options:
                  sd['options'] = [{'text': 'Review and take appropriate action', 'order': 0}]
              else:
                  for i, opt in enumerate(options):
                      if 'order' not in opt:
                          opt['order'] = i

              for t in result['recommended_tasks']:
                  if t.get('type') not in valid_task_types:
                      t['type'] = 'optimization'
                  if t.get('priority') not in valid_priorities:
                      t['priority'] = 'MEDIUM'

              return {
                  'validated_result': json.dumps(result),
                  'is_valid': 1
              }
        code_language: python3
        outputs:
          is_valid:
            children: null
            type: number
          validated_result:
            children: null
            type: string
