    - data:
        code: |
          def main(spreadsheet_data: str, success_criteria: str) -> dict:
              import json

              try:
                  data = json.loads(spreadsheet_data)
              except json.JSONDecodeError:
                  return {
                      'cleaned_data': spreadsheet_data,
                      'column_summary': 'Failed to parse JSON, passing raw data',
                      'criteria_text': ''
                  }

              # Parse success_criteria
              criteria_text = ''
              key_cols_from_criteria = []
              if success_criteria and success_criteria.strip():
                  try:
                      criteria = json.loads(success_criteria)
                      key_cols_from_criteria = criteria.get('key_columns', [])
                      lines = [f"Dataset type: {criteria.get('schema_type', 'unknown')}"]
                      for c in criteria.get('criteria', []):
                          if c.get('anomaly_rule'):
                              lines.append(f"- {c['column']}: {c['anomaly_rule']}")
                      if criteria.get('analysis_goals'):
                          lines.append('Analysis goals:')
                          for g in criteria['analysis_goals']:
                              lines.append(f'  * {g}')
                      criteria_text = '\n'.join(lines)
                  except (json.JSONDecodeError, TypeError):
                      pass

              all_rows = []
              columns_info = []

              sheets = data.get('sheets', [])
              for sheet in sheets:
                  columns = sheet.get('columns', [])
                  columns_info.extend(columns)
                  rows = sheet.get('rows', [])

                  # Use key_columns from criteria when available;
                  # otherwise include ALL columns from the actual file
                  key_cols = key_cols_from_criteria if key_cols_from_criteria else columns

                  for row in rows:
                      clean_row = {k: v for k, v in row.items() if k in key_cols}
                      if clean_row:
                          all_rows.append(clean_row)

              limited = all_rows[:50]

              summary = (
                  f"Spreadsheet: {data.get('name', 'Unknown')}, "
                  f"Total rows: {len(all_rows)}, Showing: {len(limited)}, "
                  f"Columns: {list(set(columns_info))}"
              )

              return {
                  'cleaned_data': json.dumps(limited, default=str),
                  'column_summary': summary,
                  'criteria_text': criteria_text
              }
        code_language: python3
        outputs:
          cleaned_data:
            children: null
            type: string
          column_summary:
            children: null
            type: string
          criteria_text:
            children: null
            type: string
        selected: false
