    - data:
        code: "def main(spreadsheet_data: str) -> dict:\n    import json\n\n    try:\n\
          \        data = json.loads(spreadsheet_data)\n    except json.JSONDecodeError:\n\
          \        return {\n            'cleaned_data': spreadsheet_data,\n     \
          \       'column_summary': 'Failed to parse JSON, passing raw data'\n   \
          \     }\n\n    all_rows = []\n    columns_info = []\n\n    sheets = data.get('sheets',\
          \ [])\n    for sheet in sheets:\n        columns = sheet.get('columns',\
          \ [])\n        columns_info.extend(columns)\n        rows = sheet.get('rows',\
          \ [])\n\n        # 提取关键列，减少 Token 消耗\n        key_cols = [\n           \
          \ 'Name', 'Status', 'Cost', 'Total Revenue', 'Revenue',\n            'ROAS',\
          \ 'ROI', 'Clicks', 'CTR', 'CPA', 'CPC', 'CPM',\n            'Impressions',\
          \ 'Conversions', 'Purchases', 'Ad Spend', 'AOV'\n        ]\n        for\
          \ row in rows:\n            clean_row = {}\n            for k, v in row.items():\n\
          \                if k in key_cols or len(key_cols) == 0:\n             \
          \       clean_row[k] = v\n            if clean_row:\n                all_rows.append(clean_row)\n\
          \n    # 限制行数防止超时\n    limited = all_rows[:50]\n\n    summary = f\"Spreadsheet:\
          \ {data.get('name', 'Unknown')}, Total rows: {len(all_rows)}, Showing: {len(limited)},\
          \ Columns: {list(set(columns_info))}\"\n\n    return {\n        'cleaned_data':\
          \ json.dumps(limited, default=str),\n        'column_summary': summary\n\
          \    }"
        code_language: python3
        outputs:
          cleaned_data:
            children: null
            type: string
          column_summary:
            children: null
            type: string
